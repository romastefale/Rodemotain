<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Rodemotain · Solicitação de entrada</title>
  <link rel="stylesheet" href="/static/join-request.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <main class="card">
    <header class="hero">
      <div class="mark">🐯</div>
      <div>
        <h1>Rodemotain</h1>
        <p>Solicitação de entrada</p>
      </div>
    </header>

    <section class="field">
      <label for="groupSelect">Grupo</label>
      <select id="groupSelect" disabled>
        <option>Carregando grupos...</option>
      </select>
      <small id="groupHint">Selecione o grupo em que você quer entrar.</small>
    </section>

    <section class="checks" aria-label="Confirmações obrigatórias">
      <label><input id="rulesCheck" type="checkbox" /> Li as regras do grupo</label>
      <label><input id="spamCheck" type="checkbox" /> Não vou enviar spam</label>
      <label><input id="captchaCheck" type="checkbox" /> Aceito passar pelo captcha</label>
    </section>

    <section class="field">
      <label id="captchaQuestion" for="captchaAnswer">Pergunta</label>
      <input id="captchaAnswer" type="number" inputmode="numeric" autocomplete="off" placeholder="Resposta" />
    </section>

    <button id="submitBtn" type="button" disabled>Enviar solicitação</button>
    <p id="status" role="status"></p>
  </main>
  <script src="/static/join-request.js"></script>
</body>
</html>
