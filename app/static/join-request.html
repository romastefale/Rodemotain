<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="format-detection" content="telephone=no" />
  <title>Rodemotain · Solicitação de entrada</title>
  <link rel="stylesheet" href="/static/join-request.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <main class="card">
    <header class="hero">
      <div class="mark" aria-hidden="true">
        <img id="botIcon" class="bot-icon" src="/telegram/bot-icon" alt="" loading="eager" />
        <span class="mark-fallback">R</span>
      </div>
      <div>
        <h1>Rodemotain</h1>
        <p>Solicitação de entrada</p>
      </div>
    </header>

    <section class="field group-field">
      <label id="groupLabel">Grupo</label>
      <select id="groupSelect" class="sr-only" aria-hidden="true" tabindex="-1" disabled>
        <option>Carregando grupos...</option>
      </select>
      <div id="groupPicker" class="group-picker">
        <button id="groupPickerButton" class="group-picker-button" type="button" role="combobox" aria-haspopup="listbox" aria-expanded="false" aria-controls="groupMenu" aria-labelledby="groupLabel groupPickerText" disabled>
          <span class="group-picker-icon" aria-hidden="true">▾</span>
          <span class="group-picker-copy">
            <span id="groupPickerText" class="group-picker-title">Carregando grupos...</span>
            <span id="groupPickerMeta" class="group-picker-meta">Aguarde</span>
          </span>
        </button>
        <div id="groupMenu" class="group-menu" role="listbox" aria-labelledby="groupLabel" hidden>
          <div class="group-empty">Carregando grupos...</div>
        </div>
      </div>
      <small id="groupHint">Selecione o grupo em que você quer entrar.</small>
    </section>

    <section class="checks" aria-label="Confirmações obrigatórias">
      <label class="choice-row">
        <input id="rulesCheck" type="checkbox" />
        <span class="choice-dot" aria-hidden="true"></span>
        <span>Li as regras do grupo</span>
      </label>
      <label class="choice-row">
        <input id="spamCheck" type="checkbox" />
        <span class="choice-dot" aria-hidden="true"></span>
        <span>Não vou enviar spam</span>
      </label>
      <label class="choice-row">
        <input id="captchaCheck" type="checkbox" />
        <span class="choice-dot" aria-hidden="true"></span>
        <span>Aceito passar pelo captcha</span>
      </label>
    </section>

    <section class="field">
      <label id="captchaQuestion" for="captchaAnswer">Pergunta</label>
      <input id="captchaAnswer" type="number" inputmode="numeric" autocomplete="off" placeholder="Resposta" />
    </section>

    <button id="submitBtn" class="submit-btn" type="button" disabled>Enviar solicitação</button>
    <p id="status" role="status"></p>
  </main>
  <script src="/static/join-request.js"></script>
</body>
</html>
